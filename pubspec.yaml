name: sui_dart
description: A cross-platform SDK for Sui blockchain, supporting Mobile, Web and Desktop.
version: 0.3.10
homepage: https://github.com/mofalabs/sui

environment:
  sdk: ^3.11.0

dependencies:
  bip32: 2.0.0
  bip39: 1.0.6
  ed25519_edwards: 0.3.1
  pointycastle: 4.0.0
  bcs_dart: 0.1.2
  dio: ^5.1.2
  hex: ^0.2.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.0
  web_socket_channel: ^2.4.0
  meta:
  grpc: ^5.1.0
  protobuf: ^6.0.0
  fixnum: ^1.1.1

dependency_overrides:
  pointycastle: 4.0.0


dev_dependencies:
  build_runner: ^2.7.0
  freezed: ^3.2.0
  json_serializable: ^6.6.1
  test: ^1.26.3
  lints: ^5.0.0
