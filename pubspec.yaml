name: sui
description: A cross-platform SDK for Sui blockchain, supporting Mobile, Web and Desktop.
version: 0.3.7
homepage: https://github.com/mofalabs/sui

environment:
  sdk: ">=3.0.3 <4.0.0"

dependencies:
  bip32: 2.0.0
  bip39: 1.0.6
  ed25519_edwards: 0.3.1
  pointycastle: 3.7.3
  bcs:
    git:
      url: https://github.com/jovinlidan/bcs-dart.git
      ref: feat/bump-bcs-sdk
  dio: ^5.1.2
  hex: ^0.2.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.0
  web_socket_channel: ^2.4.0
  meta:

dev_dependencies:
  build_runner: ^2.3.3
  freezed: ^3.2.0
  json_serializable: ^6.6.1
  test: ^1.26.3
  lints: ^5.0.0
